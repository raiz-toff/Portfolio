                                        // ─── OFFSET LOGIC ───
                                        // If explicit offset_x/y are provided, use them (Cleaner schema)
                                        if (ann.offset_x !== undefined || ann.offset_y !== undefined) {
                                            x = nodePos.x + (ann.offset_x || 0);
                                            y = nodePos.y + (ann.offset_y || 0);
                                        } else {
                                            // Fallback: Treat existing x/y as offsets to keep backward compat
                                            // with the behavior introduced in the previous step
                                            x = nodePos.x + (ann.x || 0);
                                            y = nodePos.y + (ann.y || 0);
                                        }
                                        hasTarget = true;
                                    }
                                }

                                if (style === 'tag') {
                                    // Tags have specific smart-positioning logic relative to the anchor
                                    if (hasTarget) {
                                        // Reset to node center for the specific tag offset logic below
                                        // (The existing tag logic expects base node coordinates)
                                        const nodePos = this.network.getPositions([ann.target])[ann.target];
                                        let tx = nodePos.x; 
                                        let ty = nodePos.y;
                                        
                                        const offset = 45; 
                                        const diag = 35; 

                                        if (ann.position) {
                                            switch(ann.position.toLowerCase()) {
                                                case 'top': ty -= offset; break;
                                                case 'bottom': ty += offset; break;
                                                case 'left': tx -= offset; break;
                                                case 'right': tx += offset; break;
                                                case 'top-right': tx += diag; ty -= diag; break;
                                                case 'top-left': tx -= diag; ty -= diag; break;
                                                case 'bottom-right': tx += diag; ty += diag; break;
                                                case 'bottom-left': tx -= diag; ty += diag; break;
                                            }
                                        } else {
                                            // Legacy fallback (add manual offsets if defined)
                                            tx += (ann.offset_x || 0);
                                            ty += (ann.offset_y || -60);
                                        }
                                        this.drawTagAnnotation(ctx, ann.text, tx, ty);
                                    }
                                } else {
                                    // Free-floating text (h2, note) OR Anchored Note
                                    // If anchored, x/y are already adjusted above to be Node + Offset
                                    
                                    if (style === 'h1') {
                                        this.drawMainTitle(ctx, ann.text, x, y);
                                    } else if (style === 'h2' || style === 'h3') {
                                        this.drawHeaderAnnotation(ctx, ann.text, x, y, style);
                                    } else {
                                        this.drawNoteAnnotation(ctx, ann.text, x, y);
                                    }
                                }
                                ctx.restore();
                            });
                        } catch (err) {
                            console.error("Annotation Render Error:", err);
                        }
                    });

                    // Keyboard shortcuts
                    document.addEventListener('keydown', (e) => {
                        if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
                            e.preventDefault();
                            this.showPalette = true;
                            this.$nextTick(() => this.$refs.paletteInput?.focus());
                        }
                    });

                    this.updateLayout(this.viewMode);
                    setTimeout(() => {
                        this.network.fit();
                        // Start traffic by default
                        this.initTrafficParticles();
                        this.animateTraffic();
                    }, 500);
                },

                toggleDarkMode() {
                    this.darkMode = !this.darkMode;
                    document.body.classList.toggle('light-mode', !this.darkMode);
                    this.network.setOptions(this.getOptions());
                    this.network.redraw();
                },

                processNodes() {
                    return RAW_NODES.map(n => ({ ...n }));
                },

                drawTagAnnotation(ctx, text, x, y) {
                    ctx.font = "600 11px Inter";
                    const w = ctx.measureText(text).width + 20;
                    ctx.fillStyle = this.darkMode ? "rgba(79, 70, 229, 0.9)" : "rgba(99, 102, 241, 0.9)";
                    ctx.beginPath();
                    if (ctx.roundRect) ctx.roundRect(x - w / 2, y - 10, w, 20, 10);
                    else ctx.rect(x - w / 2, y - 10, w, 20);
                    ctx.fill();
                    
                    ctx.fillStyle = "#ffffff";
                    ctx.textAlign = "center";
                    ctx.textBaseline = "middle";
                    ctx.fillText(text, x, y);
                },

                drawMainTitle(ctx, text, x, y) {
                    ctx.font = "900 72px Inter";
                    ctx.fillStyle = this.darkMode ? "rgba(255, 255, 255, 0.05)" : "rgba(0,0,0,0.03)";
                    ctx.textAlign = "center";
                    ctx.textBaseline = "middle";
                    ctx.fillText(text.toUpperCase(), x, y);
                },

                drawHeaderAnnotation(ctx, text, x, y, style = 'h2') {
                    const size = (style === 'h1') ? 32 : (style === 'h2' ? 24 : 18);
                    ctx.font = `bold ${size}px Inter`;
                    ctx.fillStyle = this.darkMode ? "rgba(255, 255, 255, 0.9)" : "#1e293b";
                    ctx.textAlign = "center";
                    ctx.textBaseline = "middle";
                    ctx.shadowColor = this.darkMode ? "rgba(0,0,0,0.5)" : "rgba(0,0,0,0.1)";
                    ctx.shadowBlur = 10;
                    ctx.fillText(text, x, y);
                    ctx.shadowBlur = 0;
                },

                drawNoteAnnotation(ctx, text, x, y) {
                    const lines = text.split('\n');
                    ctx.font = "12px 'Space Mono'";
                    const lineHeight = 16;
                    const w = Math.max(...lines.map(l => ctx.measureText(l).width)) + 20;
                    const h = lines.length * lineHeight + 20;
                    
                    // Draw Post-it style box
                    ctx.fillStyle = this.darkMode ? "rgba(30, 41, 59, 0.8)" : "rgba(254, 252, 232, 0.9)";
                    ctx.strokeStyle = this.darkMode ? "rgba(148, 163, 184, 0.2)" : "rgba(234, 179, 8, 0.4)";
                    ctx.lineWidth = 1;
                    
                    ctx.beginPath();
                    if (ctx.roundRect) ctx.roundRect(x, y, w, h, 6);
                    else ctx.rect(x, y, w, h);
                    ctx.fill();
                    ctx.stroke();
                    
                    // Text
                    ctx.fillStyle = this.darkMode ? "#cbd5e1" : "#854d0e";
                    ctx.textAlign = "left";
                    ctx.textBaseline = "top";
                    lines.forEach((line, i) => {
                        ctx.fillText(line, x + 10, y + 10 + (i * lineHeight));
                    });
                },

                drawPortLabel(ctx, text, x, y) {
                    ctx.font = "600 9px 'Space Mono'";
                    const pad = 5;
                    const w = ctx.measureText(text).width + pad * 2;
                    ctx.fillStyle = this.darkMode ? "rgba(9, 9, 11, 0.9)" : "rgba(255, 255, 255, 0.95)";
                    ctx.strokeStyle = this.darkMode ? "rgba(255, 255, 255, 0.1)" : "rgba(0, 0, 0, 0.05)";
                    ctx.lineWidth = 1;
                    ctx.beginPath();
                    ctx.roundRect(x - w / 2, y - 8, w, 16, 4);
                    ctx.fill();
                    ctx.stroke();
                    ctx.fillStyle = this.darkMode ? "#a1a1aa" : "#4b5563";
                    ctx.textAlign = "center";
                    ctx.textBaseline = "middle";
                    ctx.fillText(text, x, y);
                },

                getOptions() {
                    const isPhysics = false;
                    const isBlueprint = this.visualMode === 'blueprint';

                    return {
                        nodes: {
                            font: {
                                color: this.showLabels ? (this.darkMode ? '#fafafa' : '#111827') : 'transparent',
                                size: 13,
                                face: 'Inter',
                                strokeWidth: this.showLabels ? 3 : 0,
                                strokeColor: this.showLabels ? (this.darkMode ? 'rgba(9, 9, 11, 0.8)' : 'rgba(255, 255, 255, 0.8)') : 'transparent'
                            },
                            borderWidth: 0,
                            shadow: !isBlueprint && {
                                enabled: true,
                                color: this.darkMode ? 'rgba(0,0,0,0.3)' : 'rgba(0,0,0,0.1)',
                                size: 12,
                                x: 0, y: 4
                            }
                        },
                        edges: {
                            color: {
                                color: (this.darkMode ? '#3f3f46' : '#d1d5db'),
                                highlight: '#6366f1',
                                opacity: 0.7
                            },
                            smooth: { 
                                enabled: false
                            },
                            width: 1.5
                        },
                        interaction: { hover: true, dragNodes: !this.isLocked, tooltipDelay: 300 },
                        physics: {
                            // ALL LAYOUTS NOW USE PRE-CALCULATED POSITIONS FROM PYTHON
                            // No physics simulation needed - clean, instant, professional diagrams
                            enabled: false
                        },
                        layout: {
                            // Disable vis.js hierarchical layout - we use Python-calculated positions
                            hierarchical: { enabled: false }
                        }
                    };
                },

                updateLayout(mode) {
                    this.viewMode = mode;
                    
                    // ═══════════════════════════════════════════════════════════════════
                    // STAGE 1: PREPARE - Stop all physics and hierarchical layout
                    // ═══════════════════════════════════════════════════════════════════
                    // CRITICAL: When switching FROM hierarchical/flow TO static layouts,
                    // we must explicitly disable BOTH physics AND hierarchical layout,
                    // otherwise Vis.js continues animating nodes.
                    this.network.setOptions({ 
                        physics: { enabled: false },
                        layout: { hierarchical: { enabled: false } }
                    });
                    
                    // Force stop any running physics simulation
                    try { this.network.stopSimulation(); } catch(e) {}

                    // Calculate Start and Target positions
                    const startPositions = this.network.getPositions(); // Current canvas coords
                    const targets = {};
                    
                    RAW_NODES.forEach(n => {
                        let tx, ty;
                        if (mode === 'city') { tx = n.x; ty = n.y; }
                        else if (mode === 'radial') { tx = n.radial_x || n.x; ty = n.radial_y || n.y; }
                        else if (mode === 'campus') { tx = n.campus_x || n.x; ty = n.campus_y || n.y; }
                        else if (mode === 'hierarchical') { tx = n.hierarchical_x || n.x; ty = n.hierarchical_y || n.y; }
                        else if (mode === 'flow') { tx = n.flow_x || n.hierarchical_x || n.x; ty = n.flow_y || n.hierarchical_y || n.y; }
                        else { tx = n.x; ty = n.y; } // Fallback
                        targets[n.id] = { x: tx, y: ty };
                    });

                    // ═══════════════════════════════════════════════════════════════════
                    // STAGE 2: GUIDED FLIGHT (Manual Animation)
                    // ═══════════════════════════════════════════════════════════════════
                    const startTime = performance.now();
                    const duration = 1000; // 1s flight time
                    
                    const animate = (time) => {
                        const elapsed = time - startTime;
                        const progress = Math.min(elapsed / duration, 1);
                        
                        // Easing: easeOutCubic (starts fast, slows down)
                        const ease = 1 - Math.pow(1 - progress, 3);
                        
                        const currentUpdates = [];
                        
                        RAW_NODES.forEach(n => {
                            const start = startPositions[n.id];
                            const target = targets[n.id];
                            
                            if (start && target) {
                                currentUpdates.push({
                                    id: n.id,
                                    x: start.x + (target.x - start.x) * ease,
                                    y: start.y + (target.y - start.y) * ease
                                });
                            }
                        });
                        
                        this.nodes.update(currentUpdates);
                        
                        if (progress < 1) {
                            requestAnimationFrame(animate);
                        } else {
                            // ═══════════════════════════════════════════════════════════════════
                            // STAGE 3: FINALIZE - Lock positions for static layouts
                            // ═══════════════════════════════════════════════════════════════════
                            // For static layouts (city/campus/radial), ensure physics stays OFF
                            // and hierarchical layout is disabled
                            this.network.setOptions({
                                physics: { enabled: false },
                                layout: { hierarchical: { enabled: false } }
                            });
                        }
                    };
                    
                    requestAnimationFrame(animate);
                },

                updateVisual(mode) {
                    this.visualMode = mode;
                    const updates = this.nodes.get().map(n => {
                        const orig = RAW_NODES.find(o => o.id === n.id);
                        if (mode === 'realistic') {
                            return {
                                id: n.id,
                                shape: orig.image ? 'image' : 'dot',
                                size: orig.size || 30,
                                image: orig.image,
                                color: this.getNodeColor(orig.type)
                            };
                        } else {
                            return {
                                id: n.id,
                                shape: 'dot',
                                size: 8,
                                image: undefined,
                                color: '#6366f1'
                            };
                        }
                    });
                    this.nodes.update(updates);
                    this.refresh();
                },

                toggleLock() {
                    this.isLocked = !this.isLocked;
                    this.network.setOptions({ interaction: { dragNodes: !this.isLocked } });
                },

                getNodeColor(type) {
                    const colors = {
                        firewall: '#ef4444',
                        router: '#3b82f6',
                        switch: '#10b981',
                        server: '#a855f7',
                        host: '#64748b',
                        cloud: '#06b6d4'
                    };
                    return colors[type?.toLowerCase()] || '#6366f1';
                },

                refresh() {
                    this.network.setOptions(this.getOptions());

                    const scale = this.network.getScale();
                    const pos = this.network.getViewPosition();
                    this.network.setOptions(this.getOptions());

                    this.network.moveTo({ position: pos, scale, animation: false });
                },

                deselectNode() {
                    // Simulate clicking on empty canvas to trigger natural deselect
                    const canvas = document.querySelector('#network-canvas canvas');
                    if (canvas) {
                        const rect = canvas.getBoundingClientRect();
                        // Click on a corner (likely empty space)
                        const event = new MouseEvent('click', {
                            bubbles: true,
                            clientX: rect.left + 10,
                            clientY: rect.top + 10
                        });
                        canvas.dispatchEvent(event);
                    }
                    // Also force clear selection state
                    this.selectedNode = null;
                },

                zoomIn() {
                    this.network.moveTo({ scale: this.network.getScale() * 1.3, animation: { duration: 300 } });
                },

                zoomOut() {
                    this.network.moveTo({ scale: this.network.getScale() / 1.3, animation: { duration: 300 } });
                },

                resetView() {
                    this.network.fit({ animation: { duration: 500 } });
                },

                focusNode(node) {
                    this.showPalette = false;
                    this.searchQuery = '';
                    this.network.focus(node.id, { scale: 1.2, animation: true });
                    this.network.selectNodes([node.id]);
                    this.selectedNode = this.nodes.get(node.id);
                },

                executeSearch() {
                    if (this.filteredNodes.length > 0) {
                        this.focusNode(this.filteredNodes[0]);
                    }
                },

                generateConfig(node) {
                    if (!node) return '';
                    if (node.running_config) return node.running_config;

                    const type = node.type || 'generic';
                    let config = `! Auto-generated configuration\n! Device: ${node.id}\n! Type: ${type}\n\n`;

                    if (type === 'server' || type === 'host') {
                        config += `# Netplan Configuration\nnetwork:\n  version: 2\n  ethernets:\n    eth0:\n      dhcp4: true\n`;
                    } else {
                        config += `hostname ${node.id}\n!\n`;
                        const links = RAW_EDGES.filter(e => e.from === node.id || e.to === node.id);
                        links.forEach((link, idx) => {
                            const isSource = link.from === node.id;
                            const iface = (isSource ? link.from_port : link.to_port) || `GigabitEthernet0/${idx}`;
                            const neighbor = isSource ? link.to : link.from;
                            config += `interface ${iface}\n description Link to ${neighbor}\n no shutdown\n!\n`;
                        });
                    }
                    return config;
                },

                copyConfig() {
                    navigator.clipboard.writeText(this.generateConfig(this.selectedNode));
                    this.copying = true;
                    setTimeout(() => this.copying = false, 2000);
                },

                // ═══════════════════════════════════════════════════════════════════════
                // TRAFFIC ANIMATION SYSTEM - Particles follow edge paths with cable-specific styling
                // ═══════════════════════════════════════════════════════════════════════

                toggleTraffic() {
                    this.showTraffic = !this.showTraffic;
                    if (this.showTraffic) {
                        this.initTrafficParticles();
                        this.animateTraffic();
                    } else {
                        if (this.trafficAnimationId) {
                            cancelAnimationFrame(this.trafficAnimationId);
                            this.trafficAnimationId = null;
                        }
                        this.trafficParticles = [];
                        this.network.redraw(); // Clear particles from canvas
                    }
                },

                initTrafficParticles() {
                    this.trafficParticles = [];
                    
                    RAW_EDGES.forEach((edge, edgeIndex) => {
                        const cableType = (edge.cable_type || 'ethernet').toLowerCase();
                        const config = TRAFFIC_CONFIG[cableType] || TRAFFIC_CONFIG.ethernet;
                        const color = edge.color || '#94a3b8';
                        
                        // Create multiple particles per edge based on cable type
                        for (let i = 0; i < config.count; i++) {
                            this.trafficParticles.push({
                                edgeIndex: edgeIndex,
                                edge: edge,
                                progress: i / config.count, // Stagger start positions
                                speed: config.speed * (0.8 + Math.random() * 0.4), // Slight variation
                                size: config.size,
                                color: color,
                                glow: config.glow,
                                fade: config.fade || false,
                                direction: Math.random() > 0.5 ? 1 : -1 // Bidirectional traffic
                            });
                        }
                    });
                },

                animateTraffic() {
                    if (!this.showTraffic) return;
                    
                    // Update particle positions
                    this.trafficParticles.forEach(particle => {
                        particle.progress += particle.speed * particle.direction;
                        
                        // Wrap around when reaching endpoints
                        if (particle.progress > 1) particle.progress = 0;
                        if (particle.progress < 0) particle.progress = 1;
                    });
                    
                    // Trigger redraw
                    this.network.redraw();
                    
                    // Continue animation loop
                    this.trafficAnimationId = requestAnimationFrame(() => this.animateTraffic());
                },

                // Called from afterDrawing event to render traffic particles
                drawTrafficParticles(ctx) {
                    if (!this.showTraffic || this.trafficParticles.length === 0) return;
                    
                    // Cache vis.js edges for performance
                    const visEdges = this.network.body.edges;
                    
                    this.trafficParticles.forEach(particle => {
                        try {
                            // Find the corresponding vis.js edge
                            let visEdge = null;
                            for (const key in visEdges) {
                                const e = visEdges[key];
                                if (e.fromId === particle.edge.from && e.toId === particle.edge.to) {
                                    visEdge = e;
                                    break;
                                }
                            }
                            
                            if (!visEdge || !visEdge.edgeType) return;
                            
                            // Use vis.js internal method to get point on the actual rendered edge
                            // The getPoint method returns {x, y} at position t (0 to 1) along the edge
                            let point;
                            if (typeof visEdge.edgeType.getPoint === 'function') {
                                point = visEdge.edgeType.getPoint(particle.progress);
                            } else {
                                // Fallback: linear interpolation between nodes
                                const fromPos = this.network.getPositions([particle.edge.from])[particle.edge.from];
                                const toPos = this.network.getPositions([particle.edge.to])[particle.edge.to];
                                if (!fromPos || !toPos) return;
                                point = {
                                    x: fromPos.x + (toPos.x - fromPos.x) * particle.progress,
                                    y: fromPos.y + (toPos.y - fromPos.y) * particle.progress
                                };
                            }
                            
                            if (!point || isNaN(point.x) || isNaN(point.y)) return;
                            
                            ctx.save();
                            
                            // Apply glow effect for fiber/smf/tunnel cables
                            if (particle.glow) {
                                ctx.shadowColor = particle.color;
                                ctx.shadowBlur = 15;
                            }
                            
                            // Apply fade effect for wireless
                            const alpha = particle.fade ? (0.4 + Math.sin(particle.progress * Math.PI) * 0.6) : 1;
                            
                            // Draw the particle dot
                            ctx.beginPath();
                            ctx.arc(point.x, point.y, particle.size, 0, Math.PI * 2);
                            
                            // Convert color to rgba with alpha
                            let fillColor = particle.color;
                            if (fillColor.startsWith('#')) {
                                const r = parseInt(fillColor.slice(1, 3), 16);
                                const g = parseInt(fillColor.slice(3, 5), 16);
                                const b = parseInt(fillColor.slice(5, 7), 16);
                                fillColor = `rgba(${r}, ${g}, ${b}, ${alpha})`;
                            } else if (fillColor.startsWith('rgba')) {
                                fillColor = fillColor.replace(/[\d.]+\)$/, `${alpha})`);
                            }
                            
                            ctx.fillStyle = fillColor;
                            ctx.fill();
                            
                            // Add bright core for glow effect (fiber optic look)
                            if (particle.glow) {
                                ctx.beginPath();
                                ctx.arc(point.x, point.y, particle.size * 0.4, 0, Math.PI * 2);
                                ctx.fillStyle = `rgba(255, 255, 255, ${alpha * 0.8})`;
                                ctx.fill();
                            }
                            
                            ctx.restore();
                        } catch (e) {
                            // Skip this particle on error
                        }
                    });
                },

                // ═══════════════════════════════════════════════════════════════════════
                // MINI-MAP IMPLEMENTATION
                // ═══════════════════════════════════════════════════════════════════════
                 
                // ═══════════════════════════════════════════════════════════════════════
                // MINI-MAP IMPLEMENTATION (Advanced RTS Style)
                // ═══════════════════════════════════════════════════════════════════════
                 
                initMinimap() {
                    this.minimapCanvas = document.getElementById('minimap-canvas');
                    if (this.minimapCanvas) {
                         this.minimapCtx = this.minimapCanvas.getContext('2d');
                         // Initial Draw
                         setTimeout(() => this.drawMinimap(), 500);
                    }

                    // Hook into redraw (pan/zoom/drag)
                    if (this.network) {
                         this.network.on('afterDrawing', () => {
                             // Use rAF to avoid blocking the main render loop
                             requestAnimationFrame(() => this.drawMinimap());
                         });
                    }
                },

                drawMinimap() {
                    if (!this.minimapCtx || !this.network) return;
                    
                    const ctx = this.minimapCtx;
                    const w = this.minimapCanvas.width;
                    const h = this.minimapCanvas.height;
                    
                    // 1. Get positions (Snapshot of current layout)
                    const positions = this.network.getPositions();
                    const ids = Object.keys(positions);
                    if (ids.length === 0) return;
                    
                    // 2. Calculate World Bounds dynamically
                    let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
                    
                    for (let id of ids) {
                        const p = positions[id];
                        if (p.x < minX) minX = p.x;
                        if (p.x > maxX) maxX = p.x;
                        if (p.y < minY) minY = p.y;
                        if (p.y > maxY) maxY = p.y;
                    }
                    
                    // Padding (maintain context)
                    const pad = 400; 
                    minX -= pad; maxX += pad;
                    minY -= pad; maxY += pad;
                    
                    const worldW = maxX - minX;
                    const worldH = maxY - minY;
                    
                    if (worldW <= 0 || worldH <= 0) return;
                    
                    // 3. Scale and Center
                    const scaleX = w / worldW;
                    const scaleY = h / worldH;
                    const scale = Math.min(scaleX, scaleY);
                    
                    const contentW = worldW * scale;
                    const contentH = worldH * scale;
                    const offX = (w - contentW) / 2;
                    const offY = (h - contentH) / 2;
                    
                    const toMini = (x, y) => ({
                        x: offX + (x - minX) * scale,
                        y: offY + (y - minY) * scale
                    });
                    
                    // Save for interaction
                    this.mmBounds = { minX, minY, scale, offX, offY };
                    
                    // 4. DRAW
                    ctx.clearRect(0, 0, w, h);
                    
                    // A. Draw Groups (Background Sectors)
                    if (RAW_GROUPS) {
                        const activeGroups = (this.viewMode === 'hierarchical' || this.viewMode === 'flow') 
                                            ? (RAW_GROUPS['campus'] || []) : (RAW_GROUPS[this.viewMode] || []);
                        
                        activeGroups.forEach(g => {
                            if (!g.nodes || g.nodes.length === 0) return;
                            
                            // Find group bounds from its nodes
                            let gMinX = Infinity, gMaxX = -Infinity, gMinY = Infinity, gMaxY = -Infinity;
                            let hasNodes = false;
                            
                            g.nodes.forEach(nid => {
                                const p = positions[nid];
                                if (p) {
                                    if (p.x < gMinX) gMinX = p.x;
                                    if (p.x > gMaxX) gMaxX = p.x;
                                    if (p.y < gMinY) gMinY = p.y;
                                    if (p.y > gMaxY) gMaxY = p.y;
                                    hasNodes = true;
                                }
                            });
                            
                            if (hasNodes) {
                                // Add visible padding to group
                                const gPad = 100;
                                const p1 = toMini(gMinX - gPad, gMinY - gPad);
                                const p2 = toMini(gMaxX + gPad, gMaxY + gPad);
                                
                                ctx.fillStyle = g.color ? g.color.replace(/[\d.]+\)$/,"0.15)") : 'rgba(255,255,255,0.05)';
                                ctx.strokeStyle = g.color ? g.color.replace(/[\d.]+\)$/,"0.3)") : 'rgba(255,255,255,0.1)';
                                ctx.lineWidth = 1;
                                
                                ctx.beginPath();
                                ctx.rect(p1.x, p1.y, p2.x - p1.x, p2.y - p1.y);
                                ctx.fill();
                                ctx.stroke();
                            }
                        });
                    }

                    // B. Draw Nodes (Color-Coded)
                    for (let id of ids) {
                         const pos = positions[id];
                         const nodeData = RAW_NODES.find(n => n.id === id);
                         const m = toMini(pos.x, pos.y);
                         
                         ctx.fillStyle = this.getNodeColor(nodeData?.type);
                         ctx.beginPath();
                         ctx.arc(m.x, m.y, 1.8, 0, Math.PI * 2);
                         ctx.fill();
                    }
                    
                    // C. Draw Viewport Rect (Camera)
                    const viewPos = this.network.getViewPosition();
                    const viewScale = this.network.getScale();
                    const container = document.getElementById('network-canvas');
                    
                    if (container) {
                        const viewW = container.clientWidth / viewScale;
                        const viewH = container.clientHeight / viewScale;
                        
                        const viewLeft = viewPos.x - viewW / 2;
                        const viewTop = viewPos.y - viewH / 2;
                        
                        const p1 = toMini(viewLeft, viewTop); 
                        const p2 = toMini(viewLeft + viewW, viewTop + viewH);
                        
                        ctx.strokeStyle = this.darkMode ? '#fafafa' : 'rgba(15, 23, 42, 0.6)'; 
                        ctx.lineWidth = 1;
                        ctx.setLineDash([]);
                        
                        const rectW = p2.x - p1.x;
                        const rectH = p2.y - p1.y;
                        
                        // Rounded Rect
                        ctx.beginPath();
                        if (ctx.roundRect) {
                            ctx.roundRect(p1.x, p1.y, rectW, rectH, 6);
                        } else {
                            ctx.rect(p1.x, p1.y, rectW, rectH);
                        }
                        ctx.stroke();
                        
                        // Fill with faint white/slate
                        ctx.fillStyle = this.darkMode ? 'rgba(255, 255, 255, 0.1)' : 'rgba(15, 23, 42, 0.05)';
                        ctx.fill();
                    }
                },
                
                startMinimapDrag(e) {
                    this.isDraggingMini = true;
                    // Treat start as a click-to-jump too
                    this.dragMinimap(e);
                },

                stopMinimapDrag() {
                    this.isDraggingMini = false;
                },
                
                dragMinimap(e) {
                    if (!this.isDraggingMini || !this.mmBounds || !this.network) return;
                    if (e.type === 'touchmove') e.preventDefault(); // Prevent scroll on mobile
                    
                    // Get pointer pos
                    const clientX = e.type.startsWith('touch') ? e.touches[0].clientX : e.clientX;
                    const clientY = e.type.startsWith('touch') ? e.touches[0].clientY : e.clientY;
                    
                    const rect = this.minimapCanvas.getBoundingClientRect();
                    const cx = clientX - rect.left;
                    const cy = clientY - rect.top;
                    
                    const { minX, minY, scale, offX, offY } = this.mmBounds;
                    
                    // Transform Click -> World
                    const worldX = ((cx - offX) / scale) + minX;
                    const worldY = ((cy - offY) / scale) + minY;
                    
                    // RTS Style: Move camera center to this world position
                    // Use moveTo without animation for instant snap during drag
                    this.network.moveTo({
                        position: { x: worldX, y: worldY },
                        animation: false
                    });
                }
            };
        }
    </script>
