lab:
  description: ''
  notes: |-
    Objective:
    Configure and verify a network where CDP and LLDP coexist without overlapping. Cisco-to-Cisco links should use CDP, and multi-vendor links should use LLDP.

    Tasks:
    Global Setup:
    Enable both cdp run and lldp run on all Cisco devices.

    Router1:
    CDP active on e0/1 and e0/2.
    LLDP transmit-only on e0/0 and e0/3.

    Router2:
    CDP on e0/0 and e0/2.
    LLDP transmit-only on e0/1 and e0/3.

    Router3:
    LLDP active on all ports.
    e0/2 transmit-only; optional CDP on Cisco link for testing.

    Switch1:
    CDP on e0/0 and e0/1.
    LLDP receive-only on e0/2.

    Switch2:
    Disable CDP.
    Enable LLDP on e0/0–e0/2; e0/3 receive-only.

    Verification:
    Use show cdp neighbours and show lldp neighbours.
    Confirm there are no duplicate neighbour entries between protocols.
    Validate that CDP and LLDP zones are separated correctly.

    Result Expected:
    A hybrid discovery environment where
    CDP zones operate only between Cisco devices
    LLDP zones handle multi-vendor interoperability
  title: Lab at Sat 22:28 PM
  version: 0.3.0
